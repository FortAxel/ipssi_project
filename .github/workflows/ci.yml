name: CI

on:
  push:
    branches:
      - main
      - develop
      - dev/beta_usable
  pull_request:
    branches:
      - main
      - develop
      - dev/beta_usable

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, iconv, mbstring, json, dom, xml, xmlwriter, tokenizer, pdo, pdo_sqlite
          coverage: none

      - name: Prepare Symfony environment
        run: cp .env.test .env

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHP CS Fixer
        run: composer lint:php

      - name: JWT key pair (tests)
        run: php bin/console lexik:jwt:generate-keypair --overwrite --no-interaction
        env:
          JWT_PASSPHRASE: ci_test_passphrase

      - name: PHPUnit
        run: composer test
        env:
          APP_ENV: test

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Vitest
        run: npm test

      - name: Production build
        run: npm run build
