services:
  mysql:
    image: mysql:8.0
    container_name: storybook_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: storybook
      MYSQL_USER: storybook
      MYSQL_PASSWORD: storybook
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  app-init:
    build:
      context: ./docker/php
    container_name: storybook_init
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./docker/init/bootstrap.sh:/docker/init/bootstrap.sh:ro
    environment:
      APP_ENV: dev
      DATABASE_URL: mysql://storybook:storybook@mysql:3306/storybook?serverVersion=8.0
      TTS_ENABLED: "1"
      TTS_PROVIDER: edge
      TTS_VOICE: fr-FR-EloiseNeural
      TTS_RATE: "-5%"
    entrypoint: ["/bin/bash", "/docker/init/bootstrap.sh"]
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"

  php:
    build:
      context: ./docker/php
    container_name: storybook_php
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: dev
      DATABASE_URL: mysql://storybook:storybook@mysql:3306/storybook?serverVersion=8.0
      TTS_ENABLED: "1"
      TTS_PROVIDER: edge
      TTS_VOICE: fr-FR-EloiseNeural
      TTS_RATE: "-5%"
    depends_on:
      mysql:
        condition: service_healthy
      app-init:
        condition: service_completed_successfully

  nginx:
    image: nginx:1.27-alpine
    container_name: storybook_nginx
    ports:
      - "8088:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  phpmyadmin:
    image: phpmyadmin:5
    container_name: storybook_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: storybook
      PMA_PASSWORD: storybook
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
