services:
  mysql:
    image: mysql:8.0
    container_name: storybook_mysql
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-storybook}
      MYSQL_USER: ${MYSQL_USER:-storybook}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-storybook}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app-init:
    build:
      context: ./docker/php
    container_name: storybook_init
    working_dir: /var/www/html
    env_file: .env
    volumes:
      - ./backend:/var/www/html
      - ./.env:/var/www/html/.env:ro
      - ./docker/init/bootstrap.sh:/docker/init/bootstrap.sh:ro
    entrypoint: ["/bin/bash", "/docker/init/bootstrap.sh"]
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"

  php:
    build:
      context: ./docker/php
    container_name: storybook_php
    working_dir: /var/www/html
    env_file: .env
    volumes:
      - ./backend:/var/www/html
      - ./.env:/var/www/html/.env:ro
    depends_on:
      mysql:
        condition: service_healthy
      app-init:
        condition: service_completed_successfully
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile.prod
    container_name: storybook_nginx
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./backend/public/images:/var/www/backend/public/images:ro
    depends_on:
      - php
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/api/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:5
    container_name: storybook_phpmyadmin
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: ${MYSQL_USER:-storybook}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-storybook}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
